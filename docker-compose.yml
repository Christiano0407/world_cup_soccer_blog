services:
  postgres:
    image: postgres:15
    container_name: data_world_cup
    env_file:
      - .env
    environment: 
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5434:5432"
    volumes:
      - ./db/postgres-sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data_world_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:latest
    container_name: data_world_minio
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - data_world_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: data_world_minio_init
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env
    entrypoint:
      - /bin/sh
      - -c
      - |
        sleep 5 &&
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
        mc mb local/$${MINIO_BUCKET} 2>/dev/null || true &&
        mc mb local/raw 2>/dev/null || true &&
        mc mb local/processed 2>/dev/null || true &&
        mc mb local/images 2>/dev/null || true &&
        exit 0;
    networks:
      - data_world_network

  worker:
    build:
      context: ./workers
      dockerfile: Dockerfile
    container_name: fifa-workers
    restart: "no"
    environment: 
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MINIO_ENDPOINT: ${S3_ENDPOINT}
      MINIO_ACCESS_KEY: ${S3_ACCESS_KEY}
      MINIO_SECRET_KEY: ${S3_SECRET_KEY}
      MINIO_SECURE: "false"
      CSV_SOURCE_PATH: /raw
    volumes:
      - ./data_raw:/raw:ro
    depends_on:
      postgres:
        condition: service_healthy
      minio: 
        condition: service_healthy
    networks:
        - data_world_network
    command: ["uv", "run", "fifa-worker", "--ingest"]

  nginx:
    build:
      context: ./infra/nginx
      dockerfile: Dockerfile
    container_name: data_world_nginx
    ports:
      - "8080:80"
    networks:
      - data_world_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/nginx-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  data_world_network:
    driver: bridge


volumes:
    postgres_data:
    minio_data: