# ══════════════════════════════════════════════════════════════ # 
# AUTH [CRUD:  Create (POST),  Read (GET), Update (PUT/PATCH), Delete (DELETE)] - HTTP Status / Methods 
# ══════════════════════════════════════════════════════════════ #
/api/v1/auth/register:
  post: 
    tags: [Authentication]
    summary: Registrar nuevo Usuario | Register new User
    operationId: auth_register
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../components/schemas/auth.yaml#/RegisterIn"}
    responses:
      "201":
        description: Usuario Creado - Retorna Acceso al Token (Access Token) | Creamos Cuenta
        headers: 
          Set-Cookie: 
            description: "Refresh_token HTTP-only cookie"
            schema: { type: string }
        content:
          application/json:
            schema: { $ref: "../components/schemas/auth.yaml#/TokenOut"}
      "409": { $ref: "../openapi.yaml#/components/responses/Conflict" }
      "422": { $ref: "../openapi.yaml#/components/responses/UnprocessableEntity" }

/api/v1/auth/login:
  post:
    tags: [Authentication]
    summary: Iniciar Sesión (Init Session)
    operationId: auth_login
    requestBody:
      required: true
      content: 
        application/json:
          schema:
            { $ref: "../components/schemas/auth.yaml#/LoginIn" }
    responses:
      "200":
        description: Login Existoso (inicio de sesión, acceso o conexión)
        headers: 
          Set-Cookie:
            description: "refresh_token HTTP-only cookie (path=/api/v1/auth/refresh)"
            schema:
              { type: string }
        content:
          application/json:
            schema:
              { $ref: "../components/schemas/auth.yaml#/TokenOut" }
      "409": { $ref: "../openapi.yaml#/components/responses/Conflict" }
      "422": { $ref: "../openapi.yaml#/components/responses/UnprocessableEntity" }

/api/v1/auth/refresh: 
  post: 
    tags: [Authentication]
    summary: Renovar Access Token (Refresh Access Token)
    operationId: auth_refresh
    description: |
      Usa el 'Refresh Access Token | refresh_token' de la cookie HTTP-only para emitir un nuevo access token.
      El Refresh token se rota en cada llamada (renueva). 
    security: 
      - RefreshCookie: []
    responses: 
      "200":
        description: Nuevo Access Token emitido (Token Renovado)
        content: 
          application/json: 
            schema: { $ref: "../components/schemas/auth.yaml#/TokenOut"}
      "401": { $ref: "../openapi.yaml#/components/responses/Unauthorized" }

/api/v1/auth/logout:
  post:
    tags: [Authentication]
    summary: Cerrar Sesión (Close Session)
    operationId: auth_logout
    security: 
      - BearerAuth: []
    responses: 
      "204": { description: Sesión Cerrada - Cookies Eliminadas }
      "401": { $ref: "../openapi.yaml#/components/responses/Unauthorized" }

/api/v1/auth/me:
  get:
    tags: [Authentication]
    summary: Perfil del usuario autenticado (Mí perfil)
    operationId: auth_me_get
    security:
      - BearerAuth: []
    responses:
      "200":
        description: Perfil del usuario | Actualizado & Autenticado
        content:
          application/json:
            schema: { $ref: "../components/schemas/auth.yaml#/UserOut" }
      "401": { $ref: "../openapi.yaml#/components/responses/Unauthorized" }

  patch:
    tags: [Authentication]
    summary: Actualizar perfil propio | Actualizo mi perfil (Password) & Authentication & Authorization
    description: Solo permite cambiar `display_name`. El rol no es modificable por el usuario.
    operationId: auth_me_patch
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../components/schemas/auth.yaml#/UserUpdateIn" }
    responses:
      "200":
        description: Perfil actualizado
        content:
          application/json:
            schema: { $ref: "../components/schemas/auth.yaml#/UserOut" }
      "401": { $ref: "../openapi.yaml#/components/responses/Unauthorized" }

/api/v1/auth/change-password:
  post:
    tags: [Authentication]
    summary: Cambiar contraseña (Actualizar el password / contraseña)
    operationId: auth_change_password
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../components/schemas/auth.yaml#/ChangePasswordIn" }
    responses:
      "204": { description: Contraseña actualizada & Autenticada & Autorizada }
      "400": { description: Contraseña actual incorrecta }
      "401": { $ref: "../openapi.yaml#/components/responses/Unauthorized"}
