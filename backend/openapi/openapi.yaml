openapi: "3.1.0"


info:
  title: FIFA World Cup Platform API
  version: "0.1.0"
  description: |
    ## FIFA World Cup Platform 
    
      API REST para la plataforma de Datos históricos del Mundial de Fútbol FIFA. 

    ### Autenticación (AUTH / Authetintication) 
      La Mayoría de los "Endpoints", son **públicos++ (Lectura de datos históricos).
      Los "Endpoints" protegidos usan **JWT Bearer Token**.

    ```
    Authorization: Bearer <access_token>
    ```
 
    Obtén el token en `POST /api/v1/auth/login`.
    El `refresh_token` se almacena en una cookie **HTTP-only** — no es accesible por JavaScript.
 
    ### Rate Limiting (Límite de Peticiones)
    | Tipo            | Límite       |
    |-----------------|--------------|
    | Público         | 60 req/min   |
    | Auth endpoints  | 10 req/min   |
 
    ### Versionado
    Todos los endpoints de producción están bajo `/api/v1/`.
    Swagger UI disponible solo en entornos `development` y `staging`.

  
  contact:
    name: Chris Velázquez | Platform Team
  license: 
    name: MIT

  
servers:
  - url: http://localhost:8000
    description: Development
  - url: https://fifaplatform.dev
    description: Staging
  - url: https://fifaplatform.com
    description: Production/Deploy


# ----------------------------------------------------------------------------------------------------------------- #
#  === Security Scheme ===
# ----------------------------------------------------------------------------------------------------------------- #
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: Bearer
      bearerFormat: JWT
      description: "JWT Access Token. Obtener en POST (CRUD): /api/v1/auth/login"

    RefreshCookie: 
      type: apiKey
      in: cookie
      name: refresh_token
      description: "HTTP-only cookie con refresh token. Se establece automáticamente en login."

# ----------------------------------------------------------------------------------------------------------------- #
#  === Schemes [Datos / "components"] ===
# ----------------------------------------------------------------------------------------------------------------- #

  schemas:

    # = Shared = 
    Error:
      type: object
      required: [detail]
      properties:
        detail:
          type: string
          example: "Recurso no encontrado |Data not search"

    ValidationError:
      type: object
      required: [detail]
      properties:
        detail:
          type: array
          items:
            type: object
            properties:
              loc: {type: array, items: {type: string}}
              msg: {type: string}
              type: {type: string}

    # === Good Endpoint & Response / Request ===
    HealthOut:
      type: object
      required: [status, version, environment]
      properties:
        status: {type: string, enum: [ok, degraded, down]}
        version: { type: string, example: "0.1.0"}
        environment: { type: string, example: "development"}

    ComponentHealthOut:
      type: object
      required: [component, status, latency_me, detaiL]
      properties:
        component: {type: string, example: "db"}
        status: { type: string, enum: [ok, down]}
        latency_me: {type: number, nullable: true, example: 2.4}
        detaiL: {type: string, nullable: true}

    Paginated:
      type: object
      required: [items, total, page, page_size, pages]
      properties:
        total: {type: integer, example: 22 }
        page: { type: integer, example: 1 }
        page_size: {type: integer, example: 20}
        pages: { type: integer, example: 2}

    # === Auth === #
    RegisterIn:
      type: object
      required: [fullname, email, password]
      properties:
        fullname: 
          type: string
          minLength: 4
          maxLength: 50
          example: "Luisa Natalia Cantú Ramírez"
          description: "Mínimo de caracteres para el Nombre del Usuario es: 4"
        email: 
          type: string
          format: email
          example: "luigi@example.com"
        password: 
          type: string
          minLength: 8
          maxLength: 120
          example: "LuigiLove0407Fan"
          description: "Mínimo de 8 caracteres & al menos 1 Dígito"
        display_name: 
          type: string
          maxLength: 80
          nullable: true
          example: "FIFA Fan"

    LoginIn:
      type: object
      required: [email, password]
      properties:
        email: {type: string, format: email, example: "LuigiLove0407Fan"}
        password: {type: string, example: "luigiFanFest0407"}

    TokenOut: 
      type: object
      required: [access_token, token_type, expire_in]
      properties:
        access_token: { type: string, example: "eyJhbGciOiJIUzI1NiIs..." }
        token_type: { type: string, example: "bearer" }
        expire_in: { type: integer, example: 1800, description: "Segundos(Seconds)" }

    UserOut: 
      type: object
      required: [user_id, email, role, is_active, created_at]
      properties: 
        user_id: {type: string, format: uuid}
        email: {type: string, format: email}
        display_name: {type: string, nullable: true}
        role: {type: string, enum: [admin, editor, reader]}
        is_active: {type: boolean}
        created_at: {type: string, format: date_time}

    UserUpdateIn:
      type: object
      properties:
        display_name: { type: string, maxLength: 80, nullable: true } 

    ChangePasswordIn:
      type: object
      required: [ current_password, new_password ]
      properties:
        current_password: { type: string }
        new_password: { type: string, min_length: 8, max_length: 128 }

    # === Teams (Tipado) === #
    TeamOut: 
      type: object
      required: [ team_id, initials, name, active ]
      properties:
        team_id:        { type: integer, example: 1 }
        initials:       { type: string, example: "BRA" }
        name:           { type: string, example: "Brazil" }
        confederation:  { type: string, nullable: true, example: "CONMEBOL"}
        fifa_code:      { type: string, nullable: true, example: "BRA" }
        active:         { type: boolean, example: true }

    TeamStatsOut: 
      type: object
      properties:
        initials:       { type: string, example: "BRA" }
        name:           { type: string, example: "Brazil" }
        confederation:  { type: string, nullable: true}
        tournaments_played: { type: integer, example: 22 }
        titles:         { type: integer, example: 5 }
        runner_ups:     { type: integer, example: 2 }
        total_matches:  { type: integer, example: 114 }
        wins:           { type: integer, example: 76 }
        draws:          { type: integer, example: 18 }
        losses:         { type: integer, example: 3 }
        goals_scored:   { type: integer, example: 237 }
        goals_conceded: { type: integer, example: 101 }
        goals_difference: { type: integer, example: 136 }
        win_rate_pct:   { type: number, example: 66.67 }

    TeamIn:
      type: object
      required: [initials, name]
      properties:
        initials:       { type: string, minLength: 2, max_length: 3, example: "POR" }
        name:           { type: string, max_length: 100, example: "Portugal"}
        confederation:  { type: string, nullable: true, example: "CONMEBOL" }
        active:         { type: boolean, default: true }

    TeamUpdate:
      type: object
      properties:
        name:           { type: string, max_length: 100, nullable: true }
        confederation:  { type: string, nullable: true }
        active:         { type: boolean, nullable: true }

    # === Tournament (Tipado) === #
    TournamentOut:
      type: object
      required: [tournament_id, year, host_country, winner, runners_up, goals_scored, qualified_teams, matches_played]
      properties:
        tournament_id:    { type: integer, example: 1 }
        year:             { type: integer, example: 1930 }
        host_country:     { type: string, example: "Uruguay" }
        winner:           { type: string, example: "Uruguay" }
        runner_ups:       { type: string, example: "Argentina" }
        third_place:      { type: string, nullable: true, example: "USA" }
        fourth_place:     { type: string, nullable: true, example: "Yugoslavia" }
        goals_scored:     { type: integer, example: 70 }
        qualified_teams:  { type: integer, example: 13 }
        matches_played:   { type: integer, example: 18 }
        attendance_total: { type: integer, nullable: true,  example: 590549 }
        avg_goals_per_match: { type: number, nullable: true,  example: 3.89 }

      TournamentListOut:
        type: object
        properties:
          tournament_id:  { type: integer, example: 1 }
          year:           { type: integer, example: 1930 }
          host_country:   { type: string, example: "Uruguay" }
          winner:         { type: string, example: "Uruguay" }
          goals_scored:   { type: integer, example: 70 }
          matches_played: { type: integer, example: 18 }

      TournamentIn:
        type: object
        required: [year, host_country, winner, runners_up, goals_scored, qualified_teams, matches_played]
        properties:
          year:             { type: integer, minimum: 1930, maximum: 2030 }
          host_country:     { type: string, maxlength: 100}
          winner:           { type: string, maxlength: 100 }
          runner_ups:       { type: string, maxLength: 100 }
          third_place:      { type: string, nullable: true }
          fourth_place:     { type: string, nullable: true }
          goals_scored:     { type: integer, minimum: 0}
          qualified_teams:  { type: integer, minimum: 1, maximum: 48 }
          matches_played:   { type: integer, minimum: 1 }
          attendance_total: { type: integer, nullable: true}

      TournamentUpdate: 
        type: object
        properties:
          winner:           { type: string, nullable: true }
          runner_ups:       { type: string, nullable: true }
          goals_scored:     { type: integer, minimum: 0, nullable: true }
          attendance_total: { type: integer, nullable: true }


    # === Matches (Tipado) === #
      MatchOut:
        type: object
        required: [match_id, tournament_id, year, stage, match_datetime, home_team_initials, away_team_initials, home_goals, away_goals]
        properties:
          match_id:           { type: integer, example: 1 }
          tournament_id:      { type: integer, example: 1 }
          year:               { type: integer, example: 1930 }
          stage:              { type: string, example: "Group 1" }
          match_datetime:     { type: string, format: date-time, example: "1930-07-13T15:00:00Z" }
          stadium:            { type: string, nullable: true, example: "Pocitos" }
          city:               { type: string, nullable: true, example: "Montevideo" }
          home_team_initials: { type: string, example: "FRA" }
          away_team_initials: { type: string, example: "MEX" }
          home_team_name:     { type: string, nullable: true, example: "France" }
          away_team_name:     { type: string, nullable: true, example: "Mexico" }
          home_goals:         { type: integer, example: 4 }
          away_goals:         { type: integer, example: 1 }
          ht_home_goals:      { type: integer, nullable: true, example: 3 }
          ht_away_goals:      { type: integer, nullable: true, example: 0 }
          win_conditions:     { type: string, nullable: true, example: null }
          attendance:         { type: integer, nullable: true, example: 4444 }
          referee:            { type: string, nullable: true, example: "LOMBARDI Domingo (URU)" }
 
      MatchListOut:
        type: object
        properties:
          match_id:           { type: integer }
          year:               { type: integer }
          stage:              { type: string }
          match_datetime:     { type: string, format: date-time }
          home_team_initials: { type: string }
          away_team_initials: { type: string }
          home_goals:         { type: integer }
          away_goals:         { type: integer }


    # === Players (Tipado) === #
      PlayerAppearOut:
        type: object
        properties:
        player_match_id:          { type: integer }
        match_id:                 { type: integer }
        team_initials:            { type: string, example: "FRA" }
        coach_name:               { type: string, nullable: true, example: "CAUDRON Raoul (FRA)" }
        lineup_type:              { type: string, enum:[S, N], description: "S=Titular & N=Suplente"}
        shirt_number:             { type: integer, nullable: true }
        player_name:              { type: string, example: "Alex Thepot" }
        position:                 { type: string, nullable: true, enum: [GK, DF, MF, FW, null] }
        event_code:               { type: string, nullable: true, example: "G", description: "G=gol, Y=Yellw Card, R=Red Card, OG=Propia"  }

      PlayerCareerOut: 
        type: object
        properties:
          player_name:        { type: string }
          team_initials:      { type: string } 
          total_appearances:  { type: integer }
          starts:             { type: integer }
          substitution:       { type: integer }
          goals:              { type: integer }
          yellow_cards:       { type: integer }
          red_cards:          { type: integer }
          editions:           { type: array, items: { type: integer } }

      PlayerScoreOut: 
        type: object
        properties:
          player_name:    { type: string, example: "Miroslav KLOSE" }
          team_initials:  { type: string, example: "GER" }
          goals:          { type: integer, example: 16 }
          own_goals:      { type: integer, example: 0 }
          matches_played: { type: integer, example: 24 }
          first_wc:       { type: integer, example: 2002 }
          last_wc:        { type: integer, example: 2014 }
          editions:       { type: integer, example: 4 }


    # === Analytics (Tipado | Análisis de datos) === #


    # === ADMIN (Tipado | Roles del Usuario - permisos) | ETL Execute === #
      AdminUserOut:
        type: object
        properties:
          user_id:      { type: string, format: uuid }
          email:        { type: string, format: email }
          display_name: { type: string, nullable: true }
          role:         { type: string, enum: [admin, editor, reader] }
          is_active:    { type: boolean }
          created_at:   { type: string, format: date-time }
          updated_at:   { type: string, format: date-time }
 
      AdminUserUpdate:
        type: object
        properties:
          role:      { type: string, enum: [admin, editor, reader], nullable: true }
          is_active: { type: boolean, nullable: true }
  
      EtlTriggerIn:
        type: object
        properties:
          dataset:
            type: string
            enum: [all, winners, matches, players]
            default: all
  
      EtlStatusOut:
        type: object
        properties:
          run_id:       { type: integer, nullable: true }
          dataset:      { type: string, nullable: true }
          worker:       { type: string, nullable: true }
          status:       { type: string, enum: [running, success, failed, partial] }
          started_at:   { type: string, format: date-time, nullable: true }
          finished_at:  { type: string, format: date-time, nullable: true }
          rows_loaded:  { type: integer, nullable: true }
          rows_rejected: { type: integer, nullable: true }
          duration_s:   { type: number, nullable: true }
          triggered_by: { type: string, nullable: true }
  
      DeadLetterOut:
        type: object
        properties:
          dl_id:         { type: integer }
          source_table:  { type: string }
          source_row_id: { type: integer }
          error_code:    { type: string, example: "MISSING_YEAR" }
          error_detail:  { type: string, nullable: true }
          rejected_at:   { type: string, format: date-time }


