openapi: "3.1.0"

info:
  title: FIFA World Cup Platform API
  version: "0.1.0"
  description: |
    ## FIFA World Cup Platform 
    
      API REST para la plataforma de Datos históricos del Mundial de Fútbol FIFA. 

    ### Autenticación (AUTH / Authentication) 
      La Mayoría de los "Endpoints", son **públicos++ (Lectura de datos históricos).
      Los "Endpoints" protegidos usan **JWT Bearer Token**.

    ```
    Authorization: Bearer <access_token>
    ```
 
    Obtén el token en `POST /api/v1/auth/login`.
    El `refresh_token` se almacena en una cookie **HTTP-only** — no es accesible por JavaScript.
 
    ### Rate Limiting (Límite de Peticiones)
    | Tipo            | Límite       |
    |-----------------|--------------|
    | Público         | 60 req/min   |
    | Auth endpoints  | 10 req/min   |
 
    ### Versionado
    Todos los endpoints de producción están bajo `/api/v1/`.
    Swagger UI disponible solo en entornos `development` y `staging`.

   
  contact:
    name: Chris Velázquez | Platform Team
  license: 
    name: MIT

servers:
  - url: http://localhost:8000
    description: Development
  - url: https://fifaplatform.dev
    description: Staging
  - url: https://fifaplatform.com
    description: Production

# ----------------------------------------------------------------------------------------------------------------- #
#  === Security Scheme ===
# ----------------------------------------------------------------------------------------------------------------- #
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: Bearer
      bearerFormat: JWT
      description: "JWT Access Token. Obtener en POST (CRUD): /api/v1/auth/login"

    RefreshCookie: 
      type: apiKey
      in: cookie
      name: refresh_token
      description: "HTTP-only cookie con refresh token. Se establece automáticamente en login."

# ----------------------------------------------------------------------------------------------------------------- #
#  === Schemes [Datos / "components"] ===
# ----------------------------------------------------------------------------------------------------------------- #

  schemas:
    # = Shared = 
    Error:
      $ref: './components/schemas/shared.yaml#/Error'
    ValidationError:
      $ref: './components/schemas/shared.yaml#/ValidationError'
    HealthOut:
      $ref: './components/schemas/shared.yaml#/HealthOut'
    ComponentHealthOut:
      $ref: './components/schemas/shared.yaml#/ComponentHealthOut'
    Paginated:
      $ref: './components/schemas/shared.yaml#/Paginated'

    # === Auth === #
    RegisterIn:
      $ref: './components/schemas/auth.yaml#/RegisterIn'
    LoginIn:
      $ref: './components/schemas/auth.yaml#/LoginIn'
    TokenOut:
      $ref: './components/schemas/auth.yaml#/TokenOut'
    UserOut:
      $ref: './components/schemas/auth.yaml#/UserOut'
    UserUpdateIn:
      $ref: './components/schemas/auth.yaml#/UserUpdateIn'
    ChangePasswordIn:
      $ref: './components/schemas/auth.yaml#/ChangePasswordIn'

    # === Teams (Tipado) === #
    TeamOut:
      $ref: './components/schemas/teams.yaml#/TeamOut'
    TeamStatsOut:
      $ref: './components/schemas/teams.yaml#/TeamStatsOut'
    TeamIn:
      $ref: './components/schemas/teams.yaml#/TeamIn'
    TeamUpdate:
      $ref: './components/schemas/teams.yaml#/TeamUpdate'

    # === Tournament (Tipado) === #
    TournamentOut:
      $ref: './components/schemas/tournaments.yaml#/TournamentOut'
    TournamentListOut:
      $ref: './components/schemas/tournaments.yaml#/TournamentListOut'
    TournamentIn:
      $ref: './components/schemas/tournaments.yaml#/TournamentIn'
    TournamentUpdate:
      $ref: './components/schemas/tournaments.yaml#/TournamentUpdate'

    # === Matches (Tipado) === #
    MatchOut:
      $ref: './components/schemas/matches.yaml#/MatchOut'
    MatchListOut:
      $ref: './components/schemas/matches.yaml#/MatchListOut'

    # === Players (Tipado) === #
    PlayerAppearOut:
      $ref: './components/schemas/players.yaml#/PlayerAppearOut'
    PlayerCareerOut:
      $ref: './components/schemas/players.yaml#/PlayerCareerOut'
    TopScorerOut:
      $ref: './components/schemas/players.yaml#/TopScorerOut'

    # === ADMIN (Tipado | Roles del Usuario - permisos) | ETL Execute === #
    AdminUserOut:
      $ref: './components/schemas/admin.yaml#/AdminUserOut'
    AdminUserUpdate:
      $ref: './components/schemas/admin.yaml#/AdminUserUpdate'
    EtlTriggerIn:
      $ref: './components/schemas/admin.yaml#/EtlTriggerIn'
    EtlStatusOut:
      $ref: './components/schemas/admin.yaml#/EtlStatusOut'
    DeadLetterOut:
      $ref: './components/schemas/admin.yaml#/DeadLetterOut'

# ─────────────────────────────────────────────────────────────────────────────
# ─── === RESPONSES REUTILIZABLES === ----
# ─────────────────────────────────────────────────────────────────────────────
  responses:

    Unauthorized:
      description: Token Ausente o Inválido | No obtenido o Expiró (Tiempo)
      content: 
        application/json:
          schema:
            { $ref: "./components/schemas/shared.yaml#/Error"}
          example: { detail: "Credenciales Inválidas o Expiraron (tiempo)" }

    Forbidden: 
      description: Sin permisos suficientes
      content:
        application/json:
          schema:
            { $ref: "./components/schemas/shared.yaml#/Error" }
          example: { detail: "Acceso Denegado | Falta de permisos | Permisos insuficientes" }

    NotFound: 
      description: Recurso no encontrado
      content: 
        application/json: 
          schema:
            { $ref: "./components/schemas/shared.yaml#/Error"}
          example: { detail: "Recurso no encontrado" }

    UnprocessableEntity:
      description: Error de validación el Body 
      content:
        application/json: 
          schema:
            { $ref: "./components/schemas/shared.yaml#/Error" }

    Conflict: 
      description: Conflicto (Conflict) - Recurso ya existe ( No podemos obtener doble)
      content:
        application/json:
          schema:
            { $ref: "./components/schemas/shared.yaml#/Error"}

# ─────────────────────────────────────────────────────────────────────────────
# ───- === PARAMETERS REUTILIZABLES ==== -----
# ─────────────────────────────────────────────────────────────────────────────
  parameters:
    
    PageParam:
      name: page
      in: query
      schema:
        { type: integer, default: 1, minimum: 1 }
      description: Número de Páginas. base 1

    PageSizeParam: 
      name: page_size
      in: query
      schema:
        { type: integer, default: 20, minimum: 1, maximum: 100 }
      description: Resultado por Página

    YearParam: 
      name: year
      in: path
      required: true
      schema:
        { type: integer, minimum: 1930, maximum: 2030 }
      description: Año de la edición del Mundial

    MatchIdParam: 
      name: match_id
      in: path
      required: true
      schema:
        { type: integer }
      description: ID, del Partido (CSV original)

    InitialsParam: 
      name: initials
      in: path
      required: true
      schema:
        { type: string, minLength: 2, maxLength: 3 }
      description: Iniciales FIFA del País. (e) BRA, FRA, MEX

# ─────────────────────────────────────────────────────────────────────────────
# ====== PATHS | [Roots / Rutas] | Endpoints ======
# ─────────────────────────────────────────────────────────────────────────────
paths:

    # ══════════════════════════════════════════════════════════════ #
    # SYSTEM — Health (Bien en ejecución) checks
    # ══════════════════════════════════════════════════════════════ # 
  /api/health:
    $ref: './paths/health.yaml#/~1api~1health'
  /api/health/db:
    $ref: './paths/health.yaml#/~1api~1health~1db'
  /api/health/storage:
    $ref: './paths/health.yaml#/~1api~1health~1storage'

    # ══════════════════════════════════════════════════════════════ # 
    # AUTH [CRUD: POST, GET, UPDATE, DELETE] - HTTP Status / Methods 
    # ══════════════════════════════════════════════════════════════ #
  /api/v1/auth/register:
    $ref: './paths/auth.yaml#/~1api~1v1~1auth~1register'
  /api/v1/auth/login:
    $ref: './paths/auth.yaml#/~1api~1v1~1auth~1login'
  /api/v1/auth/refresh:
    $ref: './paths/auth.yaml#/~1api~1v1~1auth~1refresh'
  /api/v1/auth/logout:
    $ref: './paths/auth.yaml#/~1api~1v1~1auth~1logout'
  /api/v1/auth/me:
    $ref: './paths/auth.yaml#/~1api~1v1~1auth~1me'
  /api/v1/auth/change-password:
    $ref: './paths/auth.yaml#/~1api~1v1~1auth~1change-password'

    # ══════════════════════════════════════════════════════════════ #
    # TEAMS
    # ══════════════════════════════════════════════════════════════ #
  /api/v1/teams:
    $ref: './paths/teams.yaml#/~1api~1v1~1teams'
  /api/v1/teams/ranking:
    $ref: './paths/teams.yaml#/~1api~1v1~1teams~1ranking'
  /api/v1/teams/{initials}:
    $ref: './paths/teams.yaml#/~1api~1v1~1teams~1{initials}'
  /api/v1/teams/{initials}/matches:
    $ref: './paths/teams.yaml#/~1api~1v1~1teams~1{initials}~1matches'
  /api/v1/teams/{initials}/vs/{opponent}:
    $ref: './paths/teams.yaml#/~1api~1v1~1teams~1{initials}~1vs~1{opponent}'

    # ══════════════════════════════════════════════════════════════ #
    # TOURNAMENTS
    # ══════════════════════════════════════════════════════════════ #
  /api/v1/tournaments:
    $ref: './paths/tournaments.yaml#/~1api~1v1~1tournaments'
  /api/v1/tournaments/{year}:
    $ref: './paths/tournaments.yaml#/~1api~1v1~1tournaments~1{year}'
  /api/v1/tournaments/{year}/matches:
    $ref: './paths/tournaments.yaml#/~1api~1v1~1tournaments~1{year}~1matches'
  /api/v1/tournaments/{year}/top-scorers:
    $ref: './paths/tournaments.yaml#/~1api~1v1~1tournaments~1{year}~1top-scorers'
  /api/v1/tournaments/{year}/teams:
    $ref: './paths/tournaments.yaml#/~1api~1v1~1tournaments~1{year}~1teams'

    # ══════════════════════════════════════════════════════════════ #
    # MATCHES
    # ══════════════════════════════════════════════════════════════ #
  /api/v1/matches:
    $ref: './paths/matches.yaml#/~1api~1v1~1matches'
  /api/v1/matches/search:
    $ref: './paths/matches.yaml#/~1api~1v1~1matches~1search'
  /api/v1/matches/{match_id}:
    $ref: './paths/matches.yaml#/~1api~1v1~1matches~1{match_id}'
  /api/v1/matches/{match_id}/player:
    $ref: './paths/matches.yaml#/~1api~1v1~1matches~1{match_id}~1player'

    # ══════════════════════════════════════════════════════════════ #
    # PLAYERS
    # ══════════════════════════════════════════════════════════════ #
  /api/v1/players:
    $ref: './paths/players.yaml#/~1api~1v1~1players'
  /api/v1/players/search:
    $ref: './paths/players.yaml#/~1api~1v1~1players~1search'
  /api/v1/players/top-scorers:
    $ref: './paths/players.yaml#/~1api~1v1~1players~1top-scorers'
  /api/v1/players/{name}/career:
    $ref: './paths/players.yaml#/~1api~1v1~1players~1{name}~1career'

    # ══════════════════════════════════════════════════════════════ #
    # ADMIN — role: admin required
    # ══════════════════════════════════════════════════════════════ #
  /api/v1/admin/users:
    $ref: './paths/admin.yaml#/~1api~1v1~1admin~1users'
  /api/v1/admin/users/{user_id}:
    $ref: './paths/admin.yaml#/~1api~1v1~1admin~1users~1{user_id}'
  /api/v1/admin/etl/trigger:
    $ref: './paths/admin.yaml#/~1api~1v1~1admin~1etl~1trigger'
  /api/v1/admin/etl/dead-letter:
    $ref: './paths/admin.yaml#/~1api~1v1~1admin~1etl~1dead-letter'
  /api/v1/admin/warehouse/refresh:
    $ref: './paths/admin.yaml#/~1api~1v1~1admin~1warehouse~1refresh'
  /api/v1/admin/audit-log:
    $ref: './paths/admin.yaml#/~1api~1v1~1admin~1audit-log'

# ─────────────────────────────────────────────────────────────────────────────
# ====== TAGS — orden y descripción en Swagger UI ======
# ─────────────────────────────────────────────────────────────────────────────
tags:
  - name: System
    description: "Health checks — para load balancer, Docker y monitoreo"
  - name: Authentication
    description: "JWT auth — register, login, refresh, logout, perfil"
  - name: Teams
    description: "Selecciones nacionales — stats históricos, rankings, head-to-head"
  - name: Tournaments
    description: "Ediciones del Mundial — 1930 a 2022"
  - name: Matches
    description: "Partidos individuales — búsqueda, filtros, plantillas"
  - name: Players
    description: "Jugadores — apariciones, goleadores, historial de carrera"
  - name: Analytics
    description: "Datos pre-agregados para dashboards D3.js (A1–A8) | Workers"
  - name: Admin
    description: "Administración — usuarios, ETL, warehouse, audit (role: admin)"
